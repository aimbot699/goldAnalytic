kind = "web"
previewPath = "/"
title = "Gold Live Analytic"
version = "1.0.0"
id = "artifacts/gold-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23389

[services.development]
run = "pnpm --filter @workspace/gold-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gold-tracker", "run", "build" ]
publicDir = "artifacts/gold-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23389"
BASE_PATH = "/"
